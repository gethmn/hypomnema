name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  format:
    name: format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable (rust-toolchain.toml drives the actual version)
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2.9.1
        with:
          shared-key: format
      - name: cargo fmt --check
        run: cargo fmt --all -- --check

  lint:
    name: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable (rust-toolchain.toml drives the actual version)
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2.9.1
        with:
          shared-key: lint
      - name: cargo clippy
        run: cargo clippy --all-targets -- -D warnings

  test:
    name: test
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable (rust-toolchain.toml drives the actual version)
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2.9.1
        with:
          shared-key: test-${{ matrix.os }}
      - uses: taiki-e/install-action@a987447a36adfd8769c91cf36dd91c79b8452fe0 # nextest (named alias)
      - name: Install sqlite-vec extension
        shell: bash
        run: |
          SQLITE_VEC_VERSION="v0.1.9"
          EXT_DIR="$HOME/.local/share/hypomnema"
          mkdir -p "$EXT_DIR"
          case "${{ runner.os }}" in
            Linux)
              URL="https://github.com/asg017/sqlite-vec/releases/download/${SQLITE_VEC_VERSION}/sqlite-vec-0.1.9-loadable-linux-x86_64.tar.gz"
              curl -sSL "$URL" | tar xz -C "$EXT_DIR"
              mv "$EXT_DIR/vec0.so" "$EXT_DIR/sqlite-vec.so"
              ;;
            macOS)
              ARCH=$(uname -m)
              URL="https://github.com/asg017/sqlite-vec/releases/download/${SQLITE_VEC_VERSION}/sqlite-vec-0.1.9-loadable-macos-${ARCH}.tar.gz"
              curl -sSL "$URL" | tar xz -C "$EXT_DIR"
              mv "$EXT_DIR/vec0.dylib" "$EXT_DIR/sqlite-vec.dylib"
              ;;
          esac
      - name: cargo nextest run
        run: cargo nextest run --profile ci
      - name: Upload JUnit XML
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: nextest-junit-${{ matrix.os }}
          path: target/nextest/ci/junit.xml
          if-no-files-found: warn
          retention-days: 7
