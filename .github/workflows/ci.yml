name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      outbox_stress:
        description: "Run the temporary step-14 outbox stress jobs"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"
      ubuntu_outbox_runs:
        description: "Ubuntu outbox stress loop count"
        required: false
        default: "10"
      macos_outbox_runs:
        description: "macOS outbox stress loop count"
        required: false
        default: "50"

permissions:
  contents: read

jobs:
  format:
    name: format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable (rust-toolchain.toml drives the actual version)
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2.9.1
        with:
          shared-key: format
      - name: cargo fmt --check
        run: cargo fmt --all -- --check

  lint:
    name: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable (rust-toolchain.toml drives the actual version)
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2.9.1
        with:
          shared-key: lint
      - name: cargo clippy
        run: cargo clippy --all-targets -- -D warnings

  test:
    name: test
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable (rust-toolchain.toml drives the actual version)
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2.9.1
        with:
          shared-key: test-${{ matrix.os }}
      - uses: taiki-e/install-action@a987447a36adfd8769c91cf36dd91c79b8452fe0 # nextest (named alias)
      - name: Install sqlite-vec extension
        shell: bash
        run: |
          SQLITE_VEC_VERSION="v0.1.9"
          EXT_DIR="$HOME/.local/share/hypomnema"
          mkdir -p "$EXT_DIR"
          case "${{ runner.os }}" in
            Linux)
              URL="https://github.com/asg017/sqlite-vec/releases/download/${SQLITE_VEC_VERSION}/sqlite-vec-0.1.9-loadable-linux-x86_64.tar.gz"
              curl -fsSL "$URL" -o /tmp/sqlite-vec.tar.gz
              tar xzf /tmp/sqlite-vec.tar.gz -C "$EXT_DIR"
              mv "$EXT_DIR/vec0.so" "$EXT_DIR/sqlite-vec.so"
              ;;
            macOS)
              ARCH=$(uname -m)
              # sqlite-vec uses aarch64, not arm64 (macOS uname convention differs)
              [ "$ARCH" = "arm64" ] && ARCH="aarch64"
              URL="https://github.com/asg017/sqlite-vec/releases/download/${SQLITE_VEC_VERSION}/sqlite-vec-0.1.9-loadable-macos-${ARCH}.tar.gz"
              curl -fsSL "$URL" -o /tmp/sqlite-vec.tar.gz
              tar xzf /tmp/sqlite-vec.tar.gz -C "$EXT_DIR"
              mv "$EXT_DIR/vec0.dylib" "$EXT_DIR/sqlite-vec.dylib"
              ;;
          esac
      - name: cargo nextest run
        run: cargo nextest run --profile ci
      - name: Upload JUnit XML
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: nextest-junit-${{ matrix.os }}
          path: target/nextest/ci/junit.xml
          if-no-files-found: warn
          retention-days: 7

  outbox-stress-ubuntu:
    name: outbox stress (ubuntu)
    if: github.event_name == 'workflow_dispatch' && inputs.outbox_stress == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      OUTBOX_STRESS_RUNS: ${{ inputs.ubuntu_outbox_runs }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable (rust-toolchain.toml drives the actual version)
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2.9.1
        with:
          shared-key: outbox-stress-ubuntu
      - uses: taiki-e/install-action@a987447a36adfd8769c91cf36dd91c79b8452fe0 # nextest (named alias)
      - name: Run outbox stress loop
        shell: bash
        run: |
          set -euo pipefail
          pass=0
          fail=0
          start=$(date +%s)
          for i in $(seq 1 "$OUTBOX_STRESS_RUNS"); do
            if cargo nextest run --test outbox; then
              pass=$((pass + 1))
              printf 'run %02d: PASS\n' "$i"
            else
              fail=$((fail + 1))
              printf 'run %02d: FAIL\n' "$i"
            fi
          done
          end=$(date +%s)
          elapsed=$((end - start))
          printf 'SUMMARY pass=%d fail=%d total=%s elapsed_s=%d\n' "$pass" "$fail" "$OUTBOX_STRESS_RUNS" "$elapsed"
          [ "$fail" -eq 0 ]

  outbox-stress-macos:
    name: outbox stress (macos)
    if: github.event_name == 'workflow_dispatch' && inputs.outbox_stress == 'true'
    runs-on: macos-latest
    timeout-minutes: 120
    env:
      OUTBOX_STRESS_RUNS: ${{ inputs.macos_outbox_runs }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable (rust-toolchain.toml drives the actual version)
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2.9.1
        with:
          shared-key: outbox-stress-macos
      - uses: taiki-e/install-action@a987447a36adfd8769c91cf36dd91c79b8452fe0 # nextest (named alias)
      - name: Run outbox stress loop
        shell: bash
        run: |
          set -euo pipefail
          pass=0
          fail=0
          start=$(date +%s)
          for i in $(seq 1 "$OUTBOX_STRESS_RUNS"); do
            if cargo nextest run --test outbox; then
              pass=$((pass + 1))
              printf 'run %02d: PASS\n' "$i"
            else
              fail=$((fail + 1))
              printf 'run %02d: FAIL\n' "$i"
            fi
          done
          end=$(date +%s)
          elapsed=$((end - start))
          printf 'SUMMARY pass=%d fail=%d total=%s elapsed_s=%d\n' "$pass" "$fail" "$OUTBOX_STRESS_RUNS" "$elapsed"
          [ "$fail" -eq 0 ]
